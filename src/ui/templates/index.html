<!doctype html>
<html lang="en" class="">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>recallwell</title>
  <link rel="stylesheet" href="/assets/recallwell.css">
  <script src="/assets/tailwind.min.js"></script>
  <script src="/assets/htmx.min.js"></script>
  <script defer src="/assets/alpine.min.js"></script>
  <script>
    // Apply theme based on stored preference or system.
    (function() {
      var pref = localStorage.getItem('rw-theme') || 'auto';
      var dark = pref === 'dark' || (pref === 'auto' && window.matchMedia('(prefers-color-scheme: dark)').matches);
      if (dark) document.documentElement.classList.add('dark');
    })();
    // Inject the one-time token into every HTMX request.
    document.addEventListener('htmx:configRequest', function(evt) {
      evt.detail.headers['X-Recallwell-Token'] = '{TOKEN}';
    });
    window.RW_TOKEN = '{TOKEN}';

    function askPanel() {
      return {
        question: '',
        busy: false,
        answer: '',
        renderedAnswer: '',
        citations: [],
        trace: '',
        library: '{LIBRARY_NAME}',
        ask: async function () {
          if (!this.question.trim() || this.busy) return;
          this.busy = true;
          this.answer = '';
          this.renderedAnswer = '';
          this.citations = [];
          this.trace = '';

          var resp = await fetch('/api/ask?t=' + encodeURIComponent(window.RW_TOKEN), {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'X-Recallwell-Token': window.RW_TOKEN },
            body: JSON.stringify({ question: this.question })
          });
          if (!resp.ok || !resp.body) {
            this.busy = false;
            this.answer = '(error: ' + resp.status + ' ' + resp.statusText + ')';
            this.renderedAnswer = this.answer;
            return;
          }
          var reader = resp.body.getReader();
          var dec = new TextDecoder();
          var buf = '';
          var self = this;
          while (true) {
            var chunk = await reader.read();
            if (chunk.done) break;
            buf += dec.decode(chunk.value, { stream: true });
            var parts = buf.split('\n\n');
            buf = parts.pop();
            parts.forEach(function (raw) { self.handleEvent(raw); });
          }
          this.busy = false;
        },
        handleEvent: function (raw) {
          var lines = raw.split('\n');
          var name = '';
          var data = '';
          lines.forEach(function(l) {
            if (l.startsWith('event:')) name = l.slice(6).trim();
            if (l.startsWith('data:')) data += l.slice(5).trim();
          });
          if (!name) return;
          try { data = JSON.parse(data); } catch (e) { return; }
          if (name === 'token') {
            this.answer += data.text;
            this.renderedAnswer = this.renderAnswerText(this.answer);
          } else if (name === 'citation') {
            this.citations.push(data);
          } else if (name === 'done') {
            this.trace = JSON.stringify(data, null, 2);
          } else if (name === 'error') {
            this.answer += '\n\n(stream error: ' + data.error + ')';
            this.renderedAnswer = this.renderAnswerText(this.answer);
          }
        },
        renderAnswerText: function (text) {
          return text
            .replace(/\[\^(\d+)\]/g, '<sup class="text-indigo-600">[$1]</sup>')
            .replace(/\n/g, '<br>');
        },
        openSource: function (citation) {
          var lib = encodeURIComponent('{LIBRARY_NAME}');
          var doc = encodeURIComponent(citation.doc_id);
          var url = '/api/source/' + lib + '/' + doc + '?t=' + encodeURIComponent(window.RW_TOKEN);
          if (citation.page_range && Array.isArray(citation.page_range) && citation.page_range[0]) {
            url += '#page=' + citation.page_range[0];
          }
          window.open(url, '_blank');
        }
      };
    }

    function rwToggleTheme() {
      var html = document.documentElement;
      html.classList.toggle('dark');
      localStorage.setItem('rw-theme', html.classList.contains('dark') ? 'dark' : 'light');
    }

    function rwRoot() {
      return {
        token: '{TOKEN}',
        library: '{LIBRARY_NAME}',
        version: '{VERSION}',
        sidebar: 'history',
        showShortcuts: false,
        init: function () {
          var self = this;
          window.addEventListener('keydown', function (e) {
            var mod = e.ctrlKey || e.metaKey;
            if (!mod) return;
            var k = (e.key || '').toLowerCase();
            if (k === 'k') {
              e.preventDefault();
              var ta = document.querySelector('textarea');
              if (ta) ta.focus();
            } else if (k === 'l') {
              e.preventDefault();
              var btn = document.querySelector('header button');
              if (btn) btn.click();
            } else if (k === '/') {
              e.preventDefault();
              self.showShortcuts = !self.showShortcuts;
            }
          });
          window.addEventListener('keydown', function (e) {
            if (e.key === 'Escape') self.showShortcuts = false;
          });
        }
      };
    }

    function statsFooter() {
      return {
        stats: null,
        library: '{LIBRARY_NAME}',
        version: '{VERSION}',
        load: async function () {
          try {
            var resp = await fetch('/api/stats?t=' + encodeURIComponent(window.RW_TOKEN));
            if (resp.ok) this.stats = await resp.json();
          } catch (e) {}
        },
        formatBytes: function (n) {
          var units = ['B', 'KB', 'MB', 'GB', 'TB'];
          var i = 0;
          while (n >= 1024 && i + 1 < units.length) { n = n / 1024; i++; }
          return n.toFixed(1) + ' ' + units[i];
        }
      };
    }

    function ingestPanel() {
      return {
        dragover: false,
        jobs: [],
        init: function () {
          var self = this;
          // Restore any in-flight or recently-completed jobs from the server
          // so the panel reflects reality after a reload.
          fetch('/api/ingest?t=' + encodeURIComponent(window.RW_TOKEN))
            .then(function (r) { return r.ok ? r.json() : []; })
            .then(function (list) {
              (list || []).forEach(function (j) {
                var entry = {
                  id: j.id,
                  filename: j.original_filename,
                  label: j.state.kind,
                  progress: j.state.kind === 'done' ? 1 : 0,
                  failed: j.state.kind === 'failed'
                };
                self.jobs.unshift(entry);
                if (j.state.kind !== 'done' && j.state.kind !== 'failed') {
                  self.streamProgress(entry);
                }
              });
            })
            .catch(function () {});
        },
        handleFiles: async function (fileList) {
          var files = Array.from(fileList || []);
          if (!files.length) return;
          var fd = new FormData();
          files.forEach(function (f) { fd.append('file', f); });
          var resp = await fetch('/api/ingest?t=' + encodeURIComponent(window.RW_TOKEN), {
            method: 'POST',
            body: fd,
            headers: { 'X-Recallwell-Token': window.RW_TOKEN }
          });
          if (!resp.ok) {
            this.jobs.unshift({
              id: 'err-' + Date.now(),
              filename: 'upload failed',
              label: resp.status + ' ' + resp.statusText,
              progress: 1, failed: true
            });
            return;
          }
          var data = await resp.json();
          var self = this;
          (data.jobs || []).forEach(function (j) {
            var entry = { id: j.id, filename: j.filename, label: 'queued', progress: 0, failed: false };
            self.jobs.unshift(entry);
            self.streamProgress(entry);
          });
        },
        streamProgress: function (entry) {
          var url = '/api/ingest/' + entry.id + '/stream?t=' + encodeURIComponent(window.RW_TOKEN);
          var es = new EventSource(url);
          var self = this;
          es.addEventListener('state', function(ev) {
            var s = JSON.parse(ev.data);
            switch (s.kind) {
              case 'queued': entry.label = 'queued'; entry.progress = 0; break;
              case 'parsing': entry.label = 'parsing'; entry.progress = 0.15 + (s.progress || 0) * 0.15; break;
              case 'ingesting': entry.label = 'ingesting'; entry.progress = 0.30 + (s.progress || 0) * 0.30; break;
              case 'summarizing': entry.label = 'summarizing'; entry.progress = 0.60 + (s.progress || 0) * 0.40; break;
              case 'done':
                entry.label = 'done';
                entry.progress = 1;
                es.close();
                setTimeout(function() {
                  self.jobs = self.jobs.filter(function(j) { return j.id !== entry.id; });
                }, 5000);
                break;
              case 'failed':
                entry.label = 'failed: ' + (s.error || 'unknown');
                entry.failed = true;
                entry.progress = 1;
                es.close();
                break;
            }
          });
          es.onerror = function() { es.close(); };
        }
      };
    }
  </script>
</head>
<body class="min-h-screen">
  <div x-data="rwRoot()" class="flex flex-col min-h-screen">

    <header class="rw-card mx-4 mt-4 px-4 py-3 flex items-center gap-4 shadow-sm">
      <div class="flex items-center gap-2">
        <div class="w-8 h-8 rounded-lg bg-indigo-600 text-white grid place-items-center font-bold">r</div>
        <h1 class="text-lg font-semibold tracking-tight">recallwell</h1>
        <span class="text-xs text-zinc-500" x-text="'v' + version"></span>
      </div>

      <div class="flex-1"></div>

      <div class="relative" x-data="{ open: false }">
        <button
          @click="open = !open"
          class="px-3 py-1.5 text-sm rounded-md border border-zinc-300 dark:border-zinc-700 bg-white dark:bg-zinc-900 hover:bg-zinc-50 dark:hover:bg-zinc-800 transition">
          <span class="text-zinc-500 mr-1">library:</span><span x-text="library" class="font-medium"></span>
        </button>
        <div
          x-show="open"
          @click.outside="open = false"
          x-transition
          class="absolute right-0 mt-2 w-64 rw-card shadow-md p-2 z-20"
          hx-get="/api/libraries"
          hx-trigger="intersect once"
          hx-swap="innerHTML">
          <div class="text-xs text-zinc-500 px-2 py-1">loading libraries...</div>
        </div>
      </div>

      <button
        title="Theme"
        @click="rwToggleTheme()"
        class="px-2 py-1.5 text-sm rounded-md border border-zinc-300 dark:border-zinc-700">
        <span x-text="document.documentElement.classList.contains('dark') ? 'dark' : 'light'"></span>
      </button>

      <button
        title="Keyboard shortcuts (Ctrl+/)"
        @click="showShortcuts = true"
        class="px-2 py-1.5 text-sm rounded-md border border-zinc-300 dark:border-zinc-700">?</button>
    </header>

    <main class="flex-1 grid grid-cols-1 lg:grid-cols-[1fr_320px] gap-4 px-4 py-4">

      <section class="space-y-4" x-data="askPanel()">
        <div class="rw-card p-4">
          <form @submit.prevent="ask()" class="space-y-3">
            <label class="text-xs uppercase tracking-wide text-zinc-500">Ask your library</label>
            <textarea
              x-model="question"
              rows="3"
              placeholder="What did I read about distributed consensus?"
              class="w-full p-3 rounded-md border border-zinc-300 dark:border-zinc-700 bg-white dark:bg-zinc-900 focus:outline-none focus:ring-2 focus:ring-indigo-500"></textarea>
            <div class="flex items-center justify-between">
              <div class="text-xs text-zinc-500">
                Library: <span x-text="library" class="font-medium"></span>
                <span x-show="busy" class="ml-2"><span class="rw-spinner align-middle"></span> thinking...</span>
              </div>
              <button type="submit" :disabled="busy"
                class="px-4 py-2 bg-indigo-600 text-white rounded-md font-medium hover:bg-indigo-500 transition disabled:opacity-50">
                Ask
              </button>
            </div>
          </form>
        </div>

        <article id="answer" class="rw-card p-4 max-w-none">
          <template x-if="!answer && !busy">
            <p class="text-zinc-500 italic">Your answer will appear here.</p>
          </template>
          <template x-if="answer || busy">
            <div>
              <div class="whitespace-pre-wrap" x-html="renderedAnswer"></div>
              <template x-if="citations.length">
                <div class="mt-4 space-y-2">
                  <div class="text-xs uppercase tracking-wide text-zinc-500">Citations</div>
                  <template x-for="(c, i) in citations" :key="i">
                    <div class="rw-citation text-sm">
                      <div class="font-medium" x-text="`[${i + 1}] ${c.section_title || c.doc_title}`"></div>
                      <div class="text-zinc-500 text-xs" x-text="c.doc_title"></div>
                      <div class="mt-1" x-text="c.excerpt"></div>
                      <button class="mt-1 text-xs text-indigo-600 hover:underline"
                        @click="openSource(c)">Open source</button>
                    </div>
                  </template>
                </div>
              </template>
              <details x-show="trace" class="mt-4 text-xs text-zinc-500">
                <summary class="cursor-pointer">trace</summary>
                <pre class="mt-2 p-2 bg-zinc-100 dark:bg-zinc-800 rounded overflow-x-auto" x-text="trace"></pre>
              </details>
            </div>
          </template>
        </article>
      </section>

      <aside class="space-y-4" x-data="ingestPanel()">
        <div class="rw-card p-4">
          <div class="text-xs uppercase tracking-wide text-zinc-500 mb-2">Ingest</div>
          <label
            id="ingest-drop"
            for="ingest-input"
            @dragover.prevent="dragover = true"
            @dragleave.prevent="dragover = false"
            @drop.prevent="dragover = false; handleFiles($event.dataTransfer.files)"
            :class="dragover ? 'border-indigo-500 bg-indigo-50 dark:bg-indigo-950' : 'border-zinc-300 dark:border-zinc-700'"
            class="block border-2 border-dashed rounded-md p-6 text-center text-sm text-zinc-500 cursor-pointer transition">
            Drag PDFs, EPUBs, HTML, DOCX, or Markdown here.
            <br><span class="text-xs">(or click to browse)</span>
            <input id="ingest-input" type="file" multiple class="hidden"
                   accept=".pdf,.epub,.html,.htm,.docx,.md,.markdown,.txt"
                   @change="handleFiles($event.target.files)">
          </label>
          <div id="ingest-jobs" class="mt-3 space-y-2">
            <template x-for="job in jobs" :key="job.id">
              <div class="text-xs p-2 rounded border border-zinc-200 dark:border-zinc-800">
                <div class="flex items-center justify-between">
                  <span class="font-medium" x-text="job.filename"></span>
                  <span x-text="job.label" :class="job.failed ? 'text-red-600' : 'text-zinc-500'"></span>
                </div>
                <div class="mt-1 h-1.5 bg-zinc-200 dark:bg-zinc-800 rounded overflow-hidden">
                  <div class="h-full bg-indigo-500 transition-all"
                       :style="`width: ${Math.round((job.progress || 0) * 100)}%`"></div>
                </div>
              </div>
            </template>
          </div>
        </div>

        <div class="rw-card p-4">
          <div class="flex items-center justify-between mb-2">
            <div class="text-xs uppercase tracking-wide text-zinc-500">History</div>
            <button
              hx-get="/api/history"
              hx-target="#history-list"
              hx-swap="innerHTML"
              class="text-xs text-indigo-600 hover:underline">refresh</button>
          </div>
          <div id="history-list" hx-get="/api/history" hx-trigger="load" hx-swap="innerHTML">
            <div class="text-xs text-zinc-500">loading...</div>
          </div>
        </div>
      </aside>

    </main>

    <footer class="px-4 py-3 text-xs text-zinc-500 flex items-center gap-4 flex-wrap"
            x-data="statsFooter()" x-init="load(); setInterval(load, 10000)">
      <span>library: <span x-text="library" class="font-medium"></span></span>
      <span x-show="stats">|</span>
      <span x-show="stats" x-text="'docs: ' + (stats?.library_count || 0)"></span>
      <span x-show="stats">|</span>
      <span x-show="stats" x-text="'size: ' + formatBytes(stats?.total_size_bytes || 0)"></span>
      <span x-show="stats">|</span>
      <span x-show="stats" x-text="'asks today: ' + (stats?.asks_today || 0)"></span>
      <span x-show="stats">|</span>
      <span x-show="stats" x-text="'model: ' + (stats?.synthesis_model || '')"></span>
      <span class="ml-auto">recallwell <span x-text="'v' + version"></span></span>
    </footer>

    <!-- Shortcut help overlay -->
    <div x-show="showShortcuts" x-transition x-cloak
         @keydown.escape.window="showShortcuts = false"
         class="fixed inset-0 bg-black/40 grid place-items-center z-50"
         @click="showShortcuts = false">
      <div class="rw-card p-6 max-w-md w-full mx-4" @click.stop>
        <h2 class="text-lg font-semibold mb-3">Keyboard shortcuts</h2>
        <table class="text-sm w-full">
          <tr><td class="py-1"><kbd class="px-2 py-0.5 rounded bg-zinc-200 dark:bg-zinc-800">Ctrl K</kbd></td><td>focus ask box</td></tr>
          <tr><td class="py-1"><kbd class="px-2 py-0.5 rounded bg-zinc-200 dark:bg-zinc-800">Ctrl L</kbd></td><td>focus library switcher</td></tr>
          <tr><td class="py-1"><kbd class="px-2 py-0.5 rounded bg-zinc-200 dark:bg-zinc-800">Ctrl /</kbd></td><td>this help</td></tr>
          <tr><td class="py-1"><kbd class="px-2 py-0.5 rounded bg-zinc-200 dark:bg-zinc-800">Esc</kbd></td><td>close overlays</td></tr>
        </table>
        <button class="mt-4 px-3 py-1.5 text-sm bg-indigo-600 text-white rounded"
                @click="showShortcuts = false">Got it</button>
      </div>
    </div>

  </div>
</body>
</html>
