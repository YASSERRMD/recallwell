# docker-compose.yml — local testing for recallwell
#
# Quickstart:
#   1. cp .env.example .env
#   2. Edit .env and paste your Groq API key
#   3. docker compose up --build
#   4. Open http://localhost:7676/?t=<token>   (token is printed in the logs)
#
# Data persists in the named volume `recallwell-data`. Wipe it with
#   docker compose down -v
# to start completely fresh.

services:
  recallwell:
    build:
      context: .
      dockerfile: Dockerfile
    image: recallwell:local
    container_name: recallwell
    restart: unless-stopped
    ports:
      - "${RECALLWELL_PUBLIC_PORT:-7676}:7676"
    environment:
      RECALLWELL_GROQ_API_KEY: ${RECALLWELL_GROQ_API_KEY:?set RECALLWELL_GROQ_API_KEY in .env first}
      RECALLWELL_HOST: 0.0.0.0
      RECALLWELL_PORT: 7676
      RECALLWELL_DATA_DIR: /data
      RECALLWELL_AUTO_OPEN: "false"
      RUST_LOG: ${RUST_LOG:-info,recallwell=info}
    volumes:
      - recallwell-data:/data
    healthcheck:
      # Hits / which serves a redirect to /?t=... or 401; either response
      # means the server is up.
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:7676/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

volumes:
  recallwell-data:
    name: recallwell-data
